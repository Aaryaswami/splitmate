<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SplitMate</title>
  <meta name="description" content="Sign in to SplitMate to manage shared expenses with your friends and roommates.">
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="auth-page">
    <!-- Left Illustration -->
    <div class="auth-left">
      <div class="auth-illustration">
        <div style="font-size: 72px; margin-bottom: 24px;">💸</div>
        <h2>Split Expenses, Not Friendships</h2>
        <p>Track shared costs, settle debts fairly, and keep your friendships stress-free.</p>
      </div>
    </div>

    <!-- Right Form -->
    <div class="auth-right">
      <div class="auth-form-wrapper">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
          <img src="assets/logo.svg" alt="SplitMate" width="36" height="36">
          <span style="font-family:var(--font-heading);font-size:var(--text-xl);font-weight:800;">SplitMate</span>
        </div>
        <h1>Welcome back</h1>
        <p class="subtitle">Sign in to your account</p>

        <!-- Google Sign In -->
        <button type="button" class="btn btn-google" id="google-login-btn">
          <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.9 33.6 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 8 3l5.7-5.7C34 6 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.2-2.7-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.5 18.8 12 24 12c3.1 0 5.8 1.2 8 3l5.7-5.7C34 6 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.2 26.7 36 24 36c-5.3 0-9.8-3.4-11.4-8.1l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l6.2 5.2C36.7 39.5 44 34 44 24c0-1.3-.2-2.7-.4-3.9z"/></svg>
          Continue with Google
        </button>

        <div class="divider">or</div>

        <!-- Email Login Form -->
        <form id="login-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
            <span class="form-error" id="email-error"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="password-toggle">
              <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
              <button type="button" class="toggle-btn" id="toggle-password" aria-label="Toggle password">
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>
            <span class="form-error" id="password-error"></span>
          </div>

          <div style="text-align:right;margin-bottom:16px;">
            <a href="#" id="forgot-password-link" class="text-sm">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="login-btn">
            <i class="fa-solid fa-right-to-bracket"></i> Sign In
          </button>
        </form>

        <p class="auth-footer">
          Don't have an account? <a href="register">Create one</a>
        </p>
      </div>
    </div>
  </div>

  <script type="module">
    import { loginWithGoogle, loginWithEmail, resetPassword, getAuthErrorMessage } from './js/auth.js';
    import { redirectIfLoggedIn, showToast, setButtonLoading } from './js/utils.js';

    // Redirect if already logged in
    await redirectIfLoggedIn();

    // --- Google Login ---
    document.getElementById('google-login-btn').addEventListener('click', () => {
      loginWithGoogle();
    });

    // --- Email Login ---
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');

      // Clear errors
      document.getElementById('email-error').textContent = '';
      document.getElementById('password-error').textContent = '';

      // Validate
      if (!email) { document.getElementById('email-error').textContent = 'Email is required'; return; }
      if (!password) { document.getElementById('password-error').textContent = 'Password is required'; return; }

      setButtonLoading(btn, true);
      try {
        await loginWithEmail(email, password);
      } catch (error) {
        const msg = getAuthErrorMessage(error.code);
        if (error.code?.includes('password') || error.code?.includes('credential')) {
          document.getElementById('password-error').textContent = msg;
        } else {
          document.getElementById('email-error').textContent = msg;
        }
        setButtonLoading(btn, false);
      }
    });

    // --- Forgot Password ---
    document.getElementById('forgot-password-link').addEventListener('click', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) {
        document.getElementById('email-error').textContent = 'Enter your email first';
        return;
      }
      resetPassword(email);
    });

    // --- Password Toggle ---
    document.getElementById('toggle-password').addEventListener('click', () => {
      const input = document.getElementById('password');
      const icon = document.querySelector('#toggle-password i');
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      icon.className = isPassword ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
    });
  </script>
</body>
</html>
